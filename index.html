<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picasso_AI早咖啡</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <header class="top-nav">
        <div class="nav-container">
            <div class="logo-area">
                <h1 class="logo-text">Picasso_AI早咖啡</h1>
            </div>
            <div class="nav-actions">
                <div class="nav-group">
                    <button id="btn-nav-home" class="btn-nav active"><i class="ph ph-house"></i> 首页</button>
                    <button id="btn-nav-bookmarks" class="btn-nav"><i class="ph ph-star"></i> 收藏</button>
                    <button id="btn-settings" class="btn-nav"><i class="ph ph-sliders"></i> 设置</button>
                </div>
                <div class="nav-divider"></div>
                <button id="btn-theme-toggle" class="btn-icon"><i class="ph ph-moon"></i></button>
                <div class="refresh-group">
                    <button id="btn-refresh" class="btn-refresh"><i class="ph ph-arrows-clockwise"></i> 刷新</button>
                    <span id="last-update-time" class="update-time">-</span>
                </div>
            </div>
        </div>
    </header>

    <main id="view-home" class="container">
        <!-- 技术风向标 -->
        <section class="radar-section">
            <div class="section-bar">
                <h2><i class="ph ph-trend-up"></i> 近30天 AI 技术风向标</h2>
                <span id="radar-status" class="radar-status"></span>
            </div>
            <div class="radar-grid">
                <div class="radar-group">
                    <div class="group-label"><i class="ph-fill ph-fire"></i> 最热门</div>
                    <div class="cards-row" id="hot-cards"></div>
                </div>
                <div class="radar-group">
                    <div class="group-label-row">
                        <div class="group-label"><i class="ph ph-eye"></i> 我关注的</div>
                        <button id="btn-add-watch" class="btn-icon-plus" title="添加关注"><i class="ph ph-plus"></i></button>
                    </div>
                    <div id="watch-cards" class="cards-row"><span class="empty-tip">点击 + 追踪技术</span></div>
                </div>
            </div>
            <!-- 详情面板 -->
            <div id="detail-panel" class="detail-panel hidden">
                <div class="detail-header">
                    <div>
                        <h3 id="detail-name">-</h3>
                        <div class="detail-meta">
                            <span id="detail-hot"></span>
                            <span id="detail-trend"></span>
                        </div>
                    </div>
                </div>
                <div id="detail-body" class="detail-body"></div>
            </div>
        </section>

        <!-- 速报流 -->
        <section class="feed-section">
            <div class="section-bar">
                <h2><i class="ph-fill ph-newspaper"></i> AI 极核速报</h2>
                <select id="date-filter" class="filter-select">
                    <option value="3">近3天</option>
                    <option value="7">近7天</option>
                    <option value="all">全部</option>
                </select>
            </div>
            <div id="main-feed" class="feed-list"></div>
        </section>
    </main>

    <main id="view-bookmarks" class="container view-hidden">
        <div class="section-bar">
            <h2><i class="ph-fill ph-star"></i> 我的收藏</h2>
            <div class="search-box">
                <i class="ph ph-magnifying-glass"></i>
                <input type="text" id="bookmark-search" placeholder="搜索收藏...">
            </div>
        </div>
        <div id="bookmarks-list" class="feed-list"></div>
    </main>

    <!-- 设置弹窗 -->
    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-head">
                <h3>系统设置</h3>
                <button class="close-modal"><i class="ph ph-x"></i></button>
            </div>
            <div class="section-header-flex" style="margin-bottom:8px">
                <h4>AI 逻辑引擎池</h4>
                <button id="btn-add-api" class="btn-sm-primary"><i class="ph ph-plus"></i> 新增</button>
            </div>
            <div class="source-wrap" style="max-height:120px; margin-bottom:12px">
                <table class="source-table">
                    <thead><tr><th>名称</th><th>模型/类型</th><th>状态</th><th></th></tr></thead>
                    <tbody id="api-tbody"></tbody>
                </table>
            </div>
            <div id="add-api-form" class="add-form hidden" style="margin-bottom:20px; padding:10px; background:var(--bg-hover); border-radius:8px">
                <input id="new-api-name" class="d-input" style="width:100%; margin-bottom:8px" placeholder="端点名称 (如: DeepSeek官网)">
                <input id="new-api-url" class="d-input" style="width:100%; margin-bottom:8px" placeholder="Base URL (默认: https://api.deepseek.com/v1)">
                <input id="new-api-key" type="password" class="d-input" style="width:100%; margin-bottom:8px" placeholder="API Key">
                <input id="new-api-model" class="d-input" style="width:100%; margin-bottom:8px" placeholder="模型名称 (默认: deepseek-chat)">
                <div style="display:flex; gap:8px">
                    <button id="save-new-api" class="btn-sm-primary">保存端点</button>
                    <button id="cancel-new-api" class="btn-sm-ghost">取消</button>
                </div>
            </div>

            <div class="section-header-flex" style="margin-bottom:8px">
                <h4>信息源管理</h4>
                <button id="btn-add-source" class="btn-sm-primary"><i class="ph ph-plus"></i> 添加</button>
            </div>
            <div class="source-wrap">
                <table class="source-table">
                    <thead><tr><th>名称</th><th>URL</th><th>类型</th><th></th></tr></thead>
                    <tbody id="source-tbody"></tbody>
                </table>
            </div>
            <div id="add-source-form" class="add-form hidden">
                <input id="new-source-name" class="d-input" placeholder="名称">
                <input id="new-source-url" class="d-input" placeholder="URL">
                <button id="save-new-source" class="btn-sm-primary">保存</button>
                <button id="cancel-new-source" class="btn-sm-ghost">取消</button>
            </div>
            <button id="btn-save-settings" class="btn-primary" style="margin-top:16px">保存配置</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
